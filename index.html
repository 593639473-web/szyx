<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>京东健康 · 医药数字营销中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #030608;
      --bg-deep: #050a14;
      --bg-surface: #0a1225;
      --bg-card: rgba(8, 18, 40, 0.75);
      --bg-card-hover: rgba(12, 25, 55, 0.85);
      --border-subtle: rgba(0, 180, 255, 0.08);
      --border-glow: rgba(0, 200, 255, 0.2);
      --border-active: rgba(0, 220, 255, 0.4);

      --cyan: #00d4ff;
      --cyan-dim: #0099cc;
      --blue-bright: #4d9bff;
      --blue-electric: #2d6ef7;
      --purple-glow: #7b61ff;
      --neon-green: #00ffa3;
      --red-jd: #e02020;
      --gold: #f5a623;

      --text-primary: #e8eef8;
      --text-secondary: rgba(200, 220, 255, 0.6);
      --text-dim: rgba(160, 190, 230, 0.4);

      --font-display: 'Space Grotesk', 'PingFang SC', 'Noto Sans SC', sans-serif;
      --font-body: 'PingFang SC', 'Noto Sans SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;

      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-full: 9999px;

      --dur-fast: 150ms;
      --dur-base: 300ms;
      --dur-slow: 600ms;
      --dur-epic: 1200ms;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-primary);
      background: var(--bg-void);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== 导航 ========== */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 72px;
      background: rgba(3, 6, 8, 0.8);
      backdrop-filter: blur(24px) saturate(1.2);
      border-bottom: 1px solid var(--border-subtle);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-logo-text {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .nav-logo-text .jdh {
      color: var(--red-jd);
    }

    .nav-logo-divider {
      width: 1px;
      height: 20px;
      background: rgba(255, 255, 255, 0.12);
    }

    .nav-logo-sub {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      transition: color var(--dur-base) var(--ease-smooth);
    }

    .nav-links a:hover {
      color: var(--cyan);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-nav {
      padding: 10px 24px;
      background: linear-gradient(135deg, var(--cyan-dim), var(--blue-electric));
      color: var(--text-primary);
      border: none;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: box-shadow var(--dur-base), transform var(--dur-base) var(--ease-out);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .btn-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 32px rgba(0, 212, 255, 0.4);
    }

    .nav-icons {
      display: flex;
      gap: 8px;
    }

    .nav-icon-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border-glow);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color var(--dur-base), background var(--dur-base);
    }

    .nav-icon-btn:hover {
      border-color: var(--cyan);
      background: rgba(0, 212, 255, 0.05);
    }

    .nav-icon-btn svg {
      width: 16px; height: 16px;
      stroke: var(--text-secondary);
      fill: none;
      stroke-width: 2;
    }

    /* ========== Hero ========== */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      padding: 72px 48px 0;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 60% 40%, rgba(0, 40, 100, 0.4) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 70%, rgba(0, 20, 80, 0.3) 0%, transparent 60%),
        radial-gradient(ellipse 30% 30% at 80% 80%, rgba(80, 0, 120, 0.15) 0%, transparent 50%),
        var(--bg-void);
    }

    /* 网格背景 */
    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 180, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 180, 255, 0.03) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 20%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 20%, transparent 70%);
    }

    .hero-spotlight {
      position: absolute;
      width: 900px; height: 900px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 100, 200, 0.08) 0%, transparent 55%);
      left: var(--mx, 55%);
      top: var(--my, 45%);
      transform: translate(-50%, -50%);
      pointer-events: none;
      filter: blur(40px);
      transition: left 1000ms var(--ease-out), top 1000ms var(--ease-out);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 600px;
      padding-left: 40px;
    }

    .hero-title {
      font-size: 58px;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }

    .hero-title .line {
      display: block;
      overflow: hidden;
    }

    .hero-title .line span {
      display: inline-block;
      transform: translateY(110%);
      animation: slideUp var(--dur-epic) var(--ease-out) forwards;
    }

    .hero-title .line:nth-child(1) span .highlight {
      color: var(--cyan);
    }

    .hero-title .line:nth-child(2) span {
      animation-delay: 200ms;
    }

    @keyframes slideUp {
      to { transform: translateY(0); }
    }

    .hero-subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeIn 800ms var(--ease-out) 600ms forwards;
    }

    .hero-desc {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.8;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeIn 800ms var(--ease-out) 800ms forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .hero-btns {
      display: flex;
      gap: 16px;
      opacity: 0;
      animation: fadeIn 800ms var(--ease-out) 1000ms forwards;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: linear-gradient(135deg, var(--cyan-dim), var(--blue-electric));
      color: var(--text-primary);
      border: none;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font-body);
      cursor: pointer;
      transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base);
      box-shadow: 0 4px 24px rgba(0, 180, 255, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(0, 180, 255, 0.4);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-glow);
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font-body);
      cursor: pointer;
      transition: border-color var(--dur-base), box-shadow var(--dur-base);
    }

    .btn-secondary:hover {
      border-color: var(--border-active);
      box-shadow: 0 0 20px rgba(0, 200, 255, 0.1);
    }

    /* ========== 右侧视觉 ========== */
    .hero-visual {
      position: absolute;
      right: -2%;
      top: 50%;
      transform: translateY(-50%);
      width: 700px;
      height: 700px;
      z-index: 1;
    }

    .orbit-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid;
      animation: rotateOrbit 30s linear infinite;
    }

    .orbit-ring--1 {
      width: 380px; height: 380px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-color: rgba(0, 200, 255, 0.25);
      box-shadow: 0 0 30px rgba(0, 200, 255, 0.1), inset 0 0 30px rgba(0, 200, 255, 0.05);
      animation-duration: 20s;
    }

    .orbit-ring--2 {
      width: 520px; height: 520px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-color: rgba(0, 150, 255, 0.15);
      box-shadow: 0 0 20px rgba(0, 150, 255, 0.08);
      animation-duration: 30s;
      animation-direction: reverse;
    }

    .orbit-ring--3 {
      width: 650px; height: 650px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-color: rgba(0, 120, 255, 0.08);
      animation-duration: 40s;
    }

    @keyframes rotateOrbit {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* 流光 */
    .orbit-ring--1::after {
      content: '';
      position: absolute;
      top: -2px; left: 50%;
      width: 50px; height: 4px;
      background: var(--cyan);
      border-radius: 2px;
      box-shadow: 0 0 16px var(--cyan), 0 0 40px rgba(0, 212, 255, 0.6);
    }

    .orbit-ring--2::after {
      content: '';
      position: absolute;
      bottom: -2px; right: 25%;
      width: 35px; height: 3px;
      background: var(--blue-bright);
      border-radius: 2px;
      box-shadow: 0 0 12px var(--blue-bright), 0 0 30px rgba(77, 155, 255, 0.5);
    }

    /* 地球 */
    .orbit-earth {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 320px; height: 320px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, rgba(0, 180, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 65% 65%, rgba(0, 80, 180, 0.06) 0%, transparent 40%),
        radial-gradient(circle, rgba(0, 40, 120, 0.5) 0%, rgba(0, 20, 60, 0.8) 55%, rgba(0, 5, 20, 0.95) 100%);
      box-shadow:
        0 0 60px rgba(0, 140, 255, 0.3),
        0 0 120px rgba(0, 100, 200, 0.15),
        inset 0 0 60px rgba(0, 80, 180, 0.2),
        inset -20px -20px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      animation: earthGlow 5s ease-in-out infinite;
    }

    @keyframes earthGlow {
      0%, 100% { box-shadow: 0 0 60px rgba(0,140,255,0.3), 0 0 120px rgba(0,100,200,0.15), inset 0 0 60px rgba(0,80,180,0.2), inset -20px -20px 60px rgba(0,0,0,0.5); }
      50% { box-shadow: 0 0 80px rgba(0,160,255,0.4), 0 0 160px rgba(0,120,220,0.2), inset 0 0 80px rgba(0,100,200,0.25), inset -20px -20px 60px rgba(0,0,0,0.5); }
    }

    /* 地球经纬线 */
    .orbit-earth::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        repeating-conic-gradient(from 0deg, transparent 0deg, transparent 14deg, rgba(0, 180, 255, 0.06) 14deg, rgba(0, 180, 255, 0.06) 15deg),
        repeating-radial-gradient(circle at 50% 50%, transparent 0px, transparent 28px, rgba(0, 180, 255, 0.05) 28px, rgba(0, 180, 255, 0.05) 30px);
      animation: earthSpin 60s linear infinite;
    }

    @keyframes earthSpin {
      to { transform: rotate(360deg); }
    }

    /* 地球大陆斑块（用多个渐变模拟） */
    .orbit-earth::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(ellipse 30% 20% at 30% 40%, rgba(0, 200, 255, 0.12) 0%, transparent 100%),
        radial-gradient(ellipse 25% 35% at 60% 55%, rgba(0, 160, 220, 0.1) 0%, transparent 100%),
        radial-gradient(ellipse 20% 15% at 70% 30%, rgba(0, 140, 200, 0.08) 0%, transparent 100%),
        radial-gradient(ellipse 15% 25% at 40% 70%, rgba(0, 180, 255, 0.09) 0%, transparent 100%);
      animation: earthSpin 80s linear infinite reverse;
    }

    /* 地球大气层光晕 */
    .orbit-earth-atmo {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 350px; height: 350px;
      border-radius: 50%;
      background: transparent;
      box-shadow:
        0 0 40px rgba(0, 180, 255, 0.15),
        0 0 80px rgba(0, 140, 255, 0.08);
      border: 1px solid rgba(0, 180, 255, 0.08);
      animation: atmoBreath 4s ease-in-out infinite;
    }

    @keyframes atmoBreath {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
      50% { transform: translate(-50%, -50%) scale(1.04); opacity: 1; }
    }

    /* 地球右侧高光弧 */
    .orbit-earth-highlight {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-30deg);
      width: 310px; height: 310px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-right-color: rgba(0, 200, 255, 0.25);
      border-top-color: rgba(0, 200, 255, 0.1);
      filter: blur(2px);
    }

    /* JDH 中心文字 */
    .orbit-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Arial Black', var(--font-display), sans-serif;
      font-size: 90px;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--red-jd);
      z-index: 2;
      text-shadow:
        0 2px 0 #b01818,
        0 4px 0 #901212,
        0 6px 0 #700e0e,
        0 8px 0 #500a0a,
        0 10px 20px rgba(0, 0, 0, 0.6),
        0 0 40px rgba(224, 32, 32, 0.7),
        0 0 80px rgba(224, 32, 32, 0.35),
        0 0 140px rgba(224, 32, 32, 0.15);
      animation: jdhGlow 3s ease-in-out infinite;
    }

    @keyframes jdhGlow {
      0%, 100% { filter: brightness(1) drop-shadow(0 0 20px rgba(224,32,32,0.4)); }
      50% { filter: brightness(1.15) drop-shadow(0 0 40px rgba(224,32,32,0.6)); }
    }

    /* 光粒子 */
    .orbit-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .orbit-particles span {
      position: absolute;
      width: 3px; height: 3px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--cyan), 0 0 16px rgba(0, 212, 255, 0.5);
      animation: drift 7s ease-in-out infinite;
      opacity: 0;
    }

    .orbit-particles span:nth-child(1) { left: 45%; top: 20%; animation-delay: 0s; }
    .orbit-particles span:nth-child(2) { left: 75%; top: 35%; animation-delay: 1.2s; width: 2px; height: 2px; }
    .orbit-particles span:nth-child(3) { left: 30%; top: 65%; animation-delay: 2.4s; }
    .orbit-particles span:nth-child(4) { left: 65%; top: 72%; animation-delay: 3.5s; width: 4px; height: 4px; }
    .orbit-particles span:nth-child(5) { left: 20%; top: 40%; animation-delay: 0.8s; }
    .orbit-particles span:nth-child(6) { left: 58%; top: 85%; animation-delay: 4.2s; width: 2px; height: 2px; }
    .orbit-particles span:nth-child(7) { left: 82%; top: 55%; animation-delay: 2s; }
    .orbit-particles span:nth-child(8) { left: 38%; top: 28%; animation-delay: 5s; background: var(--purple-glow); box-shadow: 0 0 8px var(--purple-glow); }
    .orbit-particles span:nth-child(9) { left: 52%; top: 50%; animation-delay: 1.8s; width: 5px; height: 5px; background: rgba(255,255,255,0.8); box-shadow: 0 0 12px #fff; }
    .orbit-particles span:nth-child(10) { left: 70%; top: 20%; animation-delay: 3s; }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(0); opacity: 0; }
      15% { opacity: 1; transform: translate(3px, -8px) scale(1); }
      85% { opacity: 0.4; transform: translate(-10px, -35px) scale(0.6); }
      100% { transform: translate(5px, -50px) scale(0); opacity: 0; }
    }

    /* 轨道节点 */
    .orbit-node {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .orbit-node-icon {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(0, 180, 255, 0.15);
      backdrop-filter: blur(12px);
      transition: box-shadow var(--dur-base), border-color var(--dur-base);
    }

    .orbit-node-icon:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
    }

    .orbit-node-icon svg {
      width: 22px; height: 22px;
      stroke: var(--cyan);
      fill: none;
      stroke-width: 1.5;
    }

    .orbit-node-label {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .orbit-node--1 { top: 6%; left: 52%; }
    .orbit-node--2 { top: 16%; right: 3%; }
    .orbit-node--3 { top: 55%; right: -4%; }
    .orbit-node--4 { bottom: 22%; right: 12%; }
    .orbit-node--5 { bottom: 12%; left: 32%; }
    .orbit-node--6 { top: 33%; left: 5%; }

    /* 向下滚动 */
    .scroll-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      font-size: 11px;
      animation: bounce 2.5s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(6px); }
    }

    .scroll-hint svg {
      width: 18px; height: 18px;
      stroke: var(--text-dim);
    }

    /* ========== 数据统计区 ========== */
    .stats-section {
      position: relative;
      z-index: 10;
      padding: 80px 48px 60px;
      background: linear-gradient(180deg, var(--bg-void) 0%, var(--bg-deep) 100%);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 28px 20px;
      text-align: center;
      backdrop-filter: blur(16px);
      transition: border-color var(--dur-base), box-shadow var(--dur-slow) var(--ease-out), transform var(--dur-slow) var(--ease-out);
    }

    .stat-card:hover {
      border-color: var(--border-glow);
      box-shadow: 0 0 30px rgba(0, 180, 255, 0.08), 0 20px 40px rgba(0, 0, 0, 0.3);
      transform: translateY(-4px);
    }

    .stat-card-icon {
      width: 48px; height: 48px;
      margin: 0 auto 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(0, 180, 255, 0.1), rgba(80, 0, 200, 0.08));
      border: 1px solid rgba(0, 180, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stat-card-icon svg {
      width: 22px; height: 22px;
      stroke: var(--cyan);
      fill: none;
      stroke-width: 1.8;
    }

    .stat-number {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      color: var(--cyan);
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .stat-number--gold { color: var(--gold); }
    .stat-number--green { color: var(--neon-green); }

    .stat-label {
      font-size: 13px;
      color: var(--text-primary);
      font-weight: 500;
      margin-bottom: 2px;
    }

    .stat-desc {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ========== 能力模块 ========== */
    .capabilities {
      padding: 80px 48px 120px;
      background: var(--bg-deep);
      text-align: center;
      position: relative;
    }

    .capabilities::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
    }

    .section-title {
      font-size: 34px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 56px;
      letter-spacing: -0.01em;
    }

    .capabilities-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .cap-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 36px 16px 28px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      transition: border-color var(--dur-base), box-shadow var(--dur-slow) var(--ease-out), transform var(--dur-slow) var(--ease-out);
    }

    .cap-card:hover {
      border-color: var(--border-glow);
      box-shadow: 0 0 24px rgba(0, 180, 255, 0.1), 0 16px 40px rgba(0, 0, 0, 0.3);
      transform: translateY(-6px);
    }

    .cap-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .cap-icon::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent, var(--cyan), transparent, var(--blue-bright), transparent);
      opacity: 0.2;
      animation: iconSpin 8s linear infinite;
    }

    @keyframes iconSpin {
      to { transform: rotate(360deg); }
    }

    .cap-icon-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(0, 160, 255, 0.15), rgba(8, 18, 40, 0.9));
      border: 1px solid rgba(0, 180, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .cap-icon svg {
      width: 26px; height: 26px;
      stroke: var(--cyan);
      fill: none;
      stroke-width: 1.5;
    }

    .cap-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .cap-divider {
      width: 24px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
      border-radius: 1px;
    }

    /* ========== 滚动入场 ========== */
    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 800ms var(--ease-out), transform 800ms var(--ease-out);
    }

    .reveal.in-view {
      opacity: 1;
      transform: translateY(0);
    }

    /* ========== 底部光效 ========== */
    .hero-bottom-glow {
      position: absolute;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 1200px;
      height: 300px;
      background: radial-gradient(ellipse 50% 100% at 50% 100%, rgba(0, 100, 200, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ========== 噪点纹理 ========== */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.035;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    /* ========== 无障碍 ========== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ========== 响应式 ========== */
    @media (max-width: 1024px) {
      .hero-visual { width: 500px; height: 500px; right: -8%; }
      .orbit-center { font-size: 60px; }
      .hero-title { font-size: 44px; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }

    }

    @media (max-width: 768px) {

      .capabilities { padding: 60px 20px; }

  </style>

  <script>
    const hero = document.querySelector('.hero');
    const spotlight = document.querySelector('.hero-spotlight');
    hero.addEventListener('mousemove', (e) => {
      const rect = hero.getBoundingClientRect();
      spotlight.style.setProperty('--mx', `${e.clientX - rect.left}px`);
      spotlight.style.setProperty('--my', `${e.clientY - rect.top}px`);
    });

    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in-view');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.15 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));

    const countIO = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          const target = parseInt(el.dataset.target);
          const duration = 2000;
          const start = performance.now();
          const tick = (now) => {
            const p = Math.min((now - start) / duration, 1);
            const eased = 1 - Math.pow(1 - p, 3);
            const val = Math.floor(eased * target);
            el.textContent = target >= 10000 ? (val / 10000).toFixed(1) : val.toLocaleString();
            if (p < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
          countIO.unobserve(el);
        }
      });
    }, { threshold: 0.5 });
    document.querySelectorAll('.count-up').forEach(el => countIO.observe(el));
  </script>
